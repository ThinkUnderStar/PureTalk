spring:
  application:
    name: PureTalk-backend

  Threads:
    virtual:
      enabled: true

  datasource:
    # ⚠️ 注意这里的 driver-class-name 也要对应新版的 com.mysql.cj.jdbc.Driver
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://地址:端口号/puretalk?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: 你的用户名
    password: 你的密码

  # ===================== Redis 最新标准配置 =====================
  data:
    redis:
      host: 地址
      port: 端口号
      database: 数据库
      timeout: 10000
      connect-timeout: 30000
      # Redis 连接池（必须加 commons-pool2 依赖）
      lettuce:
        pool:
          max-active: 8
          max-wait: -1ms
          max-idle: 8
          min-idle: 0

server:
  servlet:
    context-path: /puretalk
  port: 端口号

############## Sa-Token 配置 (文档: https://sa-token.cc) ##############
sa-token:
  # token 名称（同时也是 cookie 名称）
  token-name: satoken
  # token 有效期（单位：秒） 默认30天，-1 代表永久有效
  timeout: 2592000
  # token 最低活跃频率（单位：秒），如果 token 超过此时间没有访问系统就会被冻结，默认-1 代表不限制，永不冻结
  active-timeout: -1
  # 是否允许同一账号多地同时登录 （为 true 时允许一起登录, 为 false 时新登录挤掉旧登录）
  is-concurrent: true
  # 在多人登录同一账号时，是否共用一个 token （为 true 时所有登录共用一个 token, 为 false 时每次登录新建一个 token）
  is-share: false
  # token 风格（默认可取值：uuid、simple-uuid、random-32、random-64、random-128、tik）
  token-style: uuid
  # 是否输出操作日志
  is-log: true

#配置日志
logging:
  file:
    name: ./logs/pure-talk.log
  charset:
    file: UTF-8
    console: UTF-8
  logback:
    rollingpolicy:
      max-file-size: 10MB

ai:
  service:
    url: http://localhost:8002   # Python AI 服务的地址

puretalk:
  api:
    token: puretalk-service-key-2026